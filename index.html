<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNS Lost Post Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header class="header" id="header">
      <h1>おすすめ</h1><span>✨</span>
    </header>

    <div id="game-ui">
      <select id="mode-select">
        <option value="demo">デモ（模倣わかりやすい）</option>
        <option value="hard">本番（完全擬態）</option>
        <option value="alien">独自文字（侵食モード）</option> 
      </select>
      <span>Lv.<span id="ui-level">1</span></span>
      <div id="battery-container"><div id="battery-bar"></div></div>
      <span>🔋</span>
    </div>

    <div id="loading-overlay"><div class="spinner"></div></div>
    <main id="timeline"></main>
    <div id="bottom-loading"><div class="spinner" style="margin:0 auto;"></div></div>
  </div>

  <button id="trap-btn">↑</button>

  <div id="game-over-modal">
    <h2 style="color: #ff4444; margin-bottom: 10px;">GAME OVER</h2>
    <p id="game-over-text"></p>
    <button class="share-btn" onclick="copyShareText()">📋 結果をコピーしてシェア</button>
    <button class="retry-btn" onclick="closeGameOverAndRetry()">最初からやり直す</button>
  </div>

  <script src="data.js"></script>
  <script src="content.js"></script>
  <script src="game.js"></script>
</body>
</html>
